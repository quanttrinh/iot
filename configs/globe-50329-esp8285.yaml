packages:
  base: !include common/base.yaml

esphome:
  name: globe-50329-esp8285
  friendly_name: Globe Smart Plug (50329, ESP8285)

esp8266:
  board: esp8285
  framework:
    version: latest

light:
  - platform: status_led
    id: status_light
    internal: true
    pin: 
      number: GPIO4
      inverted: true

switch:
  - platform: gpio
    name: Switch
    id: replay_switch
    pin:
      number: GPIO12
    on_turn_on:
      then:
        - light.turn_on: status_light
    on_turn_off:
      then:
        - light.turn_off: status_light
    state_topic: !lambda 'return id(mqtt_client).get_topic_prefix() + "/switch/state";'
    command_topic: !lambda 'return id(mqtt_client).get_topic_prefix() + "/switch/state";'
    retain: true
    command_retain: false
    qos: 1
    subscribe_qos: 1

binary_sensor:
  - platform: gpio
    id: button_1
    internal: true
    pin:
      number: GPIO14
      mode:
        input: true
    on_click:
      then:
        - switch.toggle: replay_switch
    on_multi_click:
      - timing:
          - ON for at least 6s
        then:
          - button.press: restart_button
      - timing:
          - ON for 3s to 3s
          - OFF for at least 1s
          - ON for at least 3s
        then:
          - button.press: factory_reset_button
