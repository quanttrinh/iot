packages:
  base: !include common/base.yaml

esphome:
  name: yx-ws01-bk7231n
  friendly_name: YX-WS01 Smart Plug

bk72xx:
  board: generic-bk7231n-qfn32-tuya
  framework:
    version: latest
    loglevel: warn
    debug: none
    sdk_silent: auto
    gpio_recover: true

light:
  - platform: status_led
    id: status_light
    internal: true
    pin: 
      number: P26
      inverted: true

switch:
  - platform: gpio
    name: Switch
    id: replay_switch
    pin:
      number: P7
    on_turn_on:
      then:
        - light.turn_on: status_light
    on_turn_off:
      then:
        - light.turn_off: status_light
    state_topic: !lambda 'return id(mqtt_client).get_topic_prefix() + "/switch/state";'
    command_topic: !lambda 'return id(mqtt_client).get_topic_prefix() + "/switch/state";'
    retain: true
    command_retain: false
    qos: 1
    subscribe_qos: 1

binary_sensor:
  - platform: gpio
    id: button_1
    internal: true
    pin:
      number: P11
      inverted: true
      mode:
        input: true
        pullup: true
    on_click:
      then:
        - switch.toggle: replay_switch
    on_multi_click:
      - timing:
          - ON for at least 6s
        then:
          - button.press: restart_button
      - timing:
          - ON for 3s to 3s
          - OFF for at least 1s
          - ON for at least 3s
        then:
          - button.press: factory_reset_button

text_sensor:
  - platform: libretiny
    version:
      name: LibreTiny Version
      state_topic: null
      web_server:
        sorting_weight: 1
        sorting_group_id: sorting_group_device
