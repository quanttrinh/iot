text:
  - platform: template
    name: MQTT Broker
    id: mqtt_broker
    mode: text
    min_length: 1
    max_length: 24
    initial_value: 192.168.1.2
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: 'id(mqtt_client).set_broker_address(x.c_str());'

  - platform: template
    name: MQTT Username
    id: mqtt_username
    mode: text
    min_length: 1
    max_length: 32
    optimistic: true
    restore_value: true
    on_value: 
      then:
        - lambda: 'id(mqtt_client).set_username(x.c_str());'

  - platform: template
    name: MQTT Password
    id: mqtt_password
    mode: text
    min_length: 1
    max_length: 32
    optimistic: true
    restore_value: true
    on_value: 
      then:
        - lambda: 'id(mqtt_client).set_password(x.c_str());'

number:
  - platform: template
    name: MQTT Port
    id: mqtt_port
    mode: box
    min_value: 1
    max_value: 65535
    step: 1
    initial_value: 1883
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: 'id(mqtt_client).set_broker_port(x);'

esphome:
  name: yx-ws01-bk7231n
  friendly_name: YX-WS01 Switch
  name_add_mac_suffix: true

bk72xx:
  board: generic-bk7231n-qfn32-tuya
  framework:
    version: latest
    loglevel: warn
    debug: none
    sdk_silent: auto
    gpio_recover: true

logger:

web_server:
  port: 80
  local: true

wifi:
  ap:

captive_portal:

mdns:

mqtt:
  id: mqtt_client
  broker: ""

ota:
  - platform: esphome

  - platform: web_server

  # - platform: http_request

status_led:
  pin:
    number: P26
    inverted: true

button:
  - platform: restart
    name: Restart
    id: restart_button

  - platform: factory_reset
    name: Restart with Factory Default Settings
    id: factory_reset_button

switch:
  - platform: gpio
    name: Switch
    id: replay_switch
    pin:
      number: P7
    state_topic: !lambda 'return App.get_name() + "/switch/state";'
    command_topic: !lambda 'return App.get_name() + "/switch/state";'
    retain: true
    command_retain: false
    qos: 1
    subscribe_qos: 1

binary_sensor:
  - platform: status
    name: Status

  - platform: gpio
    id: button_1
    internal: true
    pin:
      number: P11
      inverted: true
      mode:
        input: true
        pullup: true
    on_click:
      then:
        - switch.toggle: replay_switch
    on_multi_click:
      - timing:
          - ON for at least 6s
        then:
          - button.press: restart_button
      - timing:
          - ON for 3s to 3s
          - OFF for at least 1s
          - ON for at least 3s
        then:
          - button.press: factory_reset_button

sensor:
  - platform: wifi_signal
    name: Wifi Signal
    update_interval: 15s

text_sensor:
  - platform: libretiny
    version:
      name: LibreTiny Version
  
  - platform: wifi_info
    ip_address:
      name: Device IP Address
    ssid:
      name: Device Connected SSID
    bssid:
      name: Device Connected BSSID
    mac_address:
      name: Device Mac Wifi Address
